{% extends "base.html" %}
{% block content %}
<h1>Configuración del rulo</h1>
<p class="subtitle">Capital inicial y fecha de arranque de la simulación</p>

<form method="post" class="config-form">
  <label for="principal">Capital inicial</label>
  <input type="number" step="0.01" min="0.01" id="principal" name="principal"
         value="{{ config[0] if config else '' }}" required>

  <label for="start_date">Fecha de inicio</label>
  <input type="date" id="start_date" name="start_date"
         value="{{ config[1].isoformat() if config else '' }}" required>

  <button type="submit">Guardar</button>
</form>
{% endblock %}
