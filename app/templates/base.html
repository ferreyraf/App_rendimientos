<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rulo Financiero</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <nav>
    <span class="brand">Rulo Financiero</span>
    <a href="{{ url_for('main.dashboard') }}">Dashboard</a>
    <a href="{{ url_for('main.historial') }}">Historial</a>
    <a href="{{ url_for('main.graficos') }}">Gráficos</a>
    <a href="{{ url_for('main.proyeccion') }}">Proyección</a>
    <a href="{{ url_for('main.recuperacion') }}">Recuperación</a>
    <a href="{{ url_for('main.patrimonio') }}">Patrimonio</a>
    <a href="{{ url_for('main.configuracion') }}">Configuración</a>
  </nav>
  <main>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <p class="flash">{{ message }}</p>
        {% endfor %}
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
