{% extends "base.html" %}
{% block content %}
<h1>Billeteras</h1>
<p class="subtitle">Ajustá tasa y horarios cuando la billetera los cambie</p>

<table>
  <thead>
    <tr>
      <th>Billetera</th>
      <th>Días activos</th>
      <th>Horarios y TNA</th>
    </tr>
  </thead>
  <tbody>
  {% for w in wallets %}
    <tr>
      <td>{{ w["name"] }}</td>
      <td>{{ "Fin de semana" if w["active_weekdays"] == "5,6" else "Lunes a viernes" }}</td>
      <td>
        <form method="post" action="{{ url_for('main.actualizar_billetera', wallet_id=w['id']) }}" class="inline-form">
          <label>Captura <input type="time" name="capture_time" value="{{ w['capture_time'] }}" required></label>
          <label>Acreditación (día siguiente) <input type="time" name="payout_time" value="{{ w['payout_time'] }}" required></label>
          <label>TNA <input type="number" step="0.01" min="0" name="tna" value="{{ w['tna'] }}" required> %</label>
          <button type="submit">Actualizar</button>
        </form>
      </td>
    </tr>
  {% endfor %}
  </tbody>
</table>
{% endblock %}
